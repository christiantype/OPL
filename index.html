<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Original Practice Lab</title>
  <link rel="stylesheet" href="shared/styles.css">

</head>
<body>
  <script src="shared/nav.js"></script>
  <div id="thumb"><img src="" alt="" /></div>

  <section id="projects">
    <div class="container">
      <div class="grid project-header">
        <span class="col-7 label">Project</span>
        <span class="col-3 label">Category</span>
        <span class="col-2 label">Year</span>
      </div>
      <div id="project-rows"></div>
    </div>
  </section>

  <script>
    const thumb    = document.getElementById('thumb');
    const thumbImg = thumb.querySelector('img');
    const tbody    = document.getElementById('project-rows');

    function bindHover() {
      document.querySelectorAll('.project-row[data-thumb]').forEach(row => {
        row.addEventListener('mouseenter', () => {
          thumbImg.src = row.dataset.thumb;
          thumb.style.opacity = '1';
        });
        row.addEventListener('mouseleave', () => { thumb.style.opacity = '0'; });
      });
    }

    fetch('projects.json')
      .then(r => r.json())
      .then(data => {
        tbody.innerHTML = data.projects.map((p, i) => `
          <div class="grid project-row${p.url ? ' has-link' : ''}" data-thumb="${p.thumb || ''}" ${p.url ? `data-url="${p.url}"` : ''} style="${p.url ? 'cursor:pointer;' : ''}animation-delay:${i * 0.07}s">
            <div class="col-7">${p.url ? `<a href="${p.url}">${p.title}</a>` : p.title}</div>
            <div class="col-3">${p.category}</div>
            <div class="col-2">${p.year}</div>
          </div>`).join('');
        bindHover();
        document.querySelectorAll('.project-row[data-url]').forEach(row => {
          row.addEventListener('click', () => window.location = row.dataset.url);
        });
      });
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="shared/footer.js"></script>
  <script src="shared/grid.js"></script>
  <script src="shared/cursor.js"></script>
  <script src="shared/animate.js"></script>
</body>
</html>
