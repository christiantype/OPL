<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Original Practice Lab</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>

    /* ── Projects ── */
    #projects {
      position: relative;
      z-index: 10;
      padding-top: var(--space-32);
      padding-bottom: var(--space-24);
    }

    .project-header {
      border-bottom: 1px solid var(--color-dark);
      padding-bottom: var(--space-3);
      margin-bottom: 0;
    }


    .project-header .col-2 { text-align: right; }

    .project-row {
      border-bottom: 1px solid var(--color-mid);
      padding-top: var(--space-3);
      padding-bottom: var(--space-3);
      align-items: baseline;
    }

    .project-row:last-child { border-bottom: none; }

    .project-row .col-7 {
      font-size: var(--body);
      letter-spacing: var(--tracking-normal);
      color: var(--color-dark);
    }

    .project-row .col-3 {
      font-size: var(--body);
      letter-spacing: var(--tracking-normal);
      color: var(--color-dark);
    }

    .project-row .col-2 {
      font-size: var(--body);
      letter-spacing: var(--tracking-normal);
      color: var(--color-dark);
      text-align: right;
    }

    .project-row a {
      color: inherit;
      text-decoration: none;
    }

    .project-row {
      transition: background 0.4s ease;
    }

    .project-row:hover {
      background: var(--color-light);
    }

    /* ── Keep project table columns on mobile ── */
    @media (max-width: 40em) {
      #projects .container { padding: 0 1.25em; }

      .project-header span,
      .project-row .col-7,
      .project-row .col-3,
      .project-row .col-2 {
        font-size: 0.6rem !important;
        letter-spacing: 0.02em !important;
      }

      .project-header .col-7,
      .project-row .col-7 { grid-column: span 7 !important; }

      .project-header .col-3,
      .project-row .col-3 { grid-column: span 3 !important; }

      .project-header .col-2,
      .project-row .col-2 { grid-column: span 2 !important; }
    }

    /* ── Thumbnail hover ── */
    #thumb {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 360px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(0.9);
      mix-blend-mode: multiply;
    }

  </style>

</head>
<body>
  <script src="shared/nav.js"></script>
  <div id="thumb"><img src="" alt="" /></div>

  <section id="projects">
    <div class="container">
      <div class="grid project-header">
        <span class="col-7 label">Project</span>
        <span class="col-3 label">Category</span>
        <span class="col-2 label">Year</span>
      </div>
      <div id="project-rows"></div>
    </div>
  </section>

  <script>
    const thumb    = document.getElementById('thumb');
    const thumbImg = thumb.querySelector('img');
    const tbody    = document.getElementById('project-rows');

    function bindHover() {
      document.querySelectorAll('.project-row[data-thumb]').forEach(row => {
        row.addEventListener('mouseenter', () => {
          thumbImg.src = row.dataset.thumb;
          thumb.style.opacity = '1';
        });
        row.addEventListener('mouseleave', () => { thumb.style.opacity = '0'; });
      });
    }

    fetch('projects.json')
      .then(r => r.json())
      .then(data => {
        tbody.innerHTML = data.projects.map(p => `
          <div class="grid project-row${p.url ? ' has-link' : ''}" data-thumb="${p.thumb || ''}" ${p.url ? `data-url="${p.url}"` : ''} style="${p.url ? 'cursor:pointer;' : ''}">
            <div class="col-7">${p.url ? `<a href="${p.url}">${p.title}</a>` : p.title}</div>
            <div class="col-3">${p.category}</div>
            <div class="col-2">${p.year}</div>
          </div>`).join('');
        bindHover();
        document.querySelectorAll('.project-row[data-url]').forEach(row => {
          row.addEventListener('click', () => window.location = row.dataset.url);
        });
      });
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="shared/footer.js"></script>
  <script src="shared/grid.js"></script>
  <script src="shared/cursor.js"></script>
</body>
</html>
