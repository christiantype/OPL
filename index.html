<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Original Practice Lab</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /*
      Palette drawn from reference image:
      --bg:   #ECEAE4  warm off-white / cream
      --ink:  #1A1917  warm near-black
      --mid:  #4A4744  dark warm gray
      --ash:  #8C8885  medium gray
      --fog:  #C4C0BB  light warm gray
    */
    :root {
      --bg:   #FFFFFF;
      --ink:  #000000;
      --mid:  #000000;
      --ash:  #000000;
      --fog:  #C4C0BB;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Untitled Sans', system-ui, sans-serif;
      color: var(--ink);
      overflow-x: hidden;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Hero ── */
    #hero {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    #wordmark {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      padding-left: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #FF69B4;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Rotating word ── */
    #rotating-word {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ash);
      opacity: 1;
      transition: opacity 0.4s ease;
      user-select: none;
    }

    #rotating-word.fade { opacity: 0; }

    /* ── Project list ── */
    #projects {
      position: relative;
      z-index: 10;
      padding-bottom: 120px;
    }

    .project-header {
      border-bottom: 1px solid var(--ink);
      padding-bottom: 10px;
      margin-bottom: 0;
    }

    .project-header span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ash);
    }

    .project-header .col-2 {
      text-align: right;
    }

    .project-row {
      border-bottom: 1px solid var(--fog);
      padding-top: 12px;
      padding-bottom: 12px;
      align-items: baseline;
    }

    .project-row:last-child {
      border-bottom: none;
    }

    .project-row .col-7 {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--ink);
    }

    .project-row .col-3 {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--ash);
    }

    .project-row .col-2 {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--ash);
      text-align: right;
    }

    .project-row a {
      color: inherit;
      text-decoration: none;
    }

    /* ── Thumbnail ── */
    #thumb {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 360px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(0.9);
      mix-blend-mode: multiply;
    }

    tbody tr {
      cursor: default;
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>
  <canvas id="canvas"></canvas>
  <div id="thumb"><img src="" alt="" /></div>

  <section id="hero">
    <div id="wordmark">Original Practice Lab<span id="cursor"></span></div>
    <div id="rotating-word">non-derivative</div>
  </section>

  <section id="projects">
    <div class="container">
      <div class="grid project-header">
        <span class="col-7">Project</span>
        <span class="col-3">Category</span>
        <span class="col-2">Year</span>
      </div>
      <div id="project-rows"></div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, raf, state = {};

    function rand(a, b) { return a + Math.random() * (b - a); }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();

    /* ══════════════════════════════════════════
       1. NODES
    ══════════════════════════════════════════ */
    function startNodes() {
      const COLORS = [[26,25,23],[74,71,68],[140,136,133],[196,192,187]];
      state.nodes = Array.from({length: 70}, () => {
        const c = COLORS[Math.floor(Math.random() * COLORS.length)];
        return { x: rand(0,W), y: rand(0,H), r: rand(0.5,2),
                 vx: rand(-0.08,0.08), vy: rand(-0.08,0.08), color: c, alpha: rand(0.25,0.7) };
      });
      (function loop() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < state.nodes.length; i++) {
          for (let j = i+1; j < state.nodes.length; j++) {
            const dx = state.nodes[j].x - state.nodes[i].x;
            const dy = state.nodes[j].y - state.nodes[i].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 150) {
              const t = 1 - dist/150;
              const a = t * Math.min(state.nodes[i].alpha, state.nodes[j].alpha) * 0.9;
              const [r,g,b] = state.nodes[i].color;
              ctx.beginPath();
              ctx.moveTo(Math.round(state.nodes[i].x) + 0.5, Math.round(state.nodes[i].y) + 0.5);
              ctx.lineTo(Math.round(state.nodes[j].x) + 0.5, Math.round(state.nodes[j].y) + 0.5);
              ctx.strokeStyle = `rgba(${r},${g},${b},${a})`; ctx.lineWidth = 1; ctx.stroke();
            }
          }
        }
        for (const n of state.nodes) {
          const [r,g,b] = n.color;
          ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(${r},${g},${b},${n.alpha})`; ctx.fill();
          n.x += n.vx; n.y += n.vy;
          if (n.x < -20) n.x = W+20; if (n.x > W+20) n.x = -20;
          if (n.y < -20) n.y = H+20; if (n.y > H+20) n.y = -20;
        }
        raf = requestAnimationFrame(loop);
      })();
    }

    /* ── Start ── */
    startNodes();

    /* ── Rotating word ── */
    (function () {
      const words = ['non-derivative','ongoing','process-based','experimental',
                     'collaborative','exploratory','opalescent','mindful',
                     'boundless','aware','heartfelt','direct','precise',
                     'vast','connected'];
      let i = 0;
      const el = document.getElementById('rotating-word');
      setInterval(() => {
        el.classList.add('fade');
        setTimeout(() => {
          i = (i + 1) % words.length;
          el.textContent = words[i];
          el.classList.remove('fade');
        }, 400);
      }, 2000);
    })();

    // ── Projects — load from projects.json ──
    const thumb    = document.getElementById('thumb');
    const thumbImg = thumb.querySelector('img');
    const tbody    = document.getElementById('project-rows');

    function bindHover() {
      document.querySelectorAll('.project-row[data-thumb]').forEach(row => {
        row.addEventListener('mouseenter', () => {
          thumbImg.src = row.dataset.thumb;
          thumb.style.opacity = '1';
        });
        row.addEventListener('mouseleave', () => {
          thumb.style.opacity = '0';
        });
      });
    }

    fetch('projects.json')
      .then(r => r.json())
      .then(data => {
        tbody.innerHTML = data.projects.map(p => `
          <div class="grid project-row${p.url ? ' has-link' : ''}" data-thumb="${p.thumb || ''}" ${p.url ? `data-url="${p.url}"` : ''} style="${p.url ? 'cursor:pointer;' : ''}">
            <div class="col-7">${p.url ? `<a href="${p.url}">${p.title}</a>` : p.title}</div>
            <div class="col-3">${p.category}</div>
            <div class="col-2">${p.year}</div>
          </div>`).join('');
        bindHover();
        document.querySelectorAll('.project-row[data-url]').forEach(row => {
          row.addEventListener('click', () => window.location = row.dataset.url);
        });
      });
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="grid.js"></script>
</body>
</html>
